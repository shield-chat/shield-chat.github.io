<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Shield Chat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h2>🛡 Shield Chat</h2>

    <div class="channels">
      <div class="channel" onclick="setChannel('general')"># general</div>
      <div class="channel" onclick="setChannel('gaming')"># gaming</div>
      <div class="channel" onclick="setChannel('random')"># random</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatArea">

    <div id="topbar"># <span id="channelName">general</span></div>

    <div id="chat"></div>

    <div id="inputBar">
      <input id="msg" placeholder="Écrire un message...">
      <button onclick="send()">➤</button>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>

</body>
</html>
